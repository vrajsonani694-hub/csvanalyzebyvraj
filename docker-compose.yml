services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ACAP_ENVIRONMENT: production
      ACAP_DATABASE_URL: sqlite:////data/analyzer.db
      ACAP_UPLOAD_DIR: /data/uploads
    volumes:
      - backend-data:/data
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  backend-data:
